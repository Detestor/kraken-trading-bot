pairs:
  - BTC/EUR
  - ETH/EUR

trading:
  order_size_eur: 5          # EUR per trade
  fee_rate: 0.0016           # Kraken Maker fee (0.16%)
  min_profit_buffer: 0.003   # 0.3% sopra il break-even
  entry_discount: 0.001      # sconto entry rispetto al last price (0.1%)
  order_ttl_seconds: 90      # TTL ordine BUY non filled prima di cancellarlo

  # Stop-loss
  stop_loss_pct: 0.004       # chiudi se il prezzo scende dello 0.4% sotto l'entry
                             # con order_size=5€ → perdita max ~0.05€ per trade

  # Trailing stop
  trailing_enabled: true     # attiva il trailing stop
  trailing_distance_pct: 0.003  # scatta se il prezzo scende del 0.3% dal picco

runtime:
  sleep_seconds: 15
