pairs:
  - BTC/EUR
  - ETH/EUR

trading:
  order_size_eur: 5          # EUR per trade
  fee_rate: 0.0016           # Kraken Maker fee (0.16%)
  min_profit_buffer: 0.001   # 0.1% sopra il break-even
  entry_discount: 0.0005     # sconto entry rispetto al last price (0.05%)
  order_ttl_seconds: 120     # TTL ordine BUY non filled prima di cancellarlo

  # Stop-loss
  stop_loss_pct: 0.01        # chiudi se il prezzo scende dell'1% sotto l'entry
                             # con order_size=5€ → perdita max ~0.05€ per trade

  # Trailing stop
  trailing_enabled: true     # attiva il trailing stop
  trailing_distance_pct: 0.002  # scatta se il prezzo scende del 0.2% dal picco

runtime:
  sleep_seconds: 15
