pairs:
  - BTC/EUR
  - ETH/EUR

trading:
  order_size_eur: 5
  fee_rate: 0.0016          # Kraken Maker fee (0.16%)
  min_profit_buffer: 0.002  # 0.2% sopra il break-even
  spread_multiplier: 1.0    # 1.0 = vendi esattamente al target, >1 = più aggressivo
  entry_discount: 0.002     # sconto entry rispetto al last price (0.2%)
  order_ttl_seconds: 120    # dopo quanti secondi cancellare un ordine non filled

runtime:
  sleep_seconds: 20
